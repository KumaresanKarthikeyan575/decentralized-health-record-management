name: kumar
description: "A new Flutter project for Decentralized Health Records using Blockchain."

# Prevent accidental publishing
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Blockchain & Web3
  web3dart: ^2.7.2
  http: ^1.2.2
  pointycastle: ^3.7.3
  
  # Wallet Connect
  walletconnect_dart: ^0.0.8
  
  # URL Launcher for WalletConnect QR Code
  url_launcher: ^6.3.0

  # Optional: For better UI (already included by default in most projects)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # If you add assets later, uncomment this:
  # assets:
  #   - images/